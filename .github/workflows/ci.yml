name: CI

# Vercel deploys via its Git integration on push/PR — independent of this workflow.
# CI runs tests and build verification only; it does not gate Vercel deployments.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build and verify bundled output
        run: |
          npm run build
          test -n "$(ls dist/app.*.js 2>/dev/null)" || { echo "no hashed app bundle in dist/"; exit 1; }
          test -n "$(ls dist/index.*.css 2>/dev/null)" || { echo "no hashed css in dist/"; exit 1; }
          test -f dist/index.html || { echo "no dist/index.html"; exit 1; }
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
